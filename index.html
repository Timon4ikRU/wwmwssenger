        .chat-avatar { width: 48px; height: 48px; border-radius: 50%; background: #202020; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; overflow: hidden; position: relative; flex-shrink: 0; }

        .file-input-label { background: #4caf50; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 12px; display: inline-block; }
        .my-id-display { background: #1a1a1a; padding: 12px; border-radius: 16px; margin: 15px 0; word-break: break-all; font-size: 12px; text-align: center; }
        .my-id-display span { color: #4caf50; font-family: monospace; user-select: all; cursor: pointer; }
        .no-items { text-align: center; color: #666; padding: 40px 20px; font-size: 14px; }
        .typing-indicator { font-size: 12px; color: #888; padding: 8px 20px; font-style: italic; }
        .search-results { background: #1a1a1a; border-radius: 12px; margin-top: 8px; max-height: 200px; overflow-y: auto; }
        .search-result-item { padding: 10px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-bottom: 1px solid #2c2c2c; transition: background 0.2s; }
        .search-result-item:hover { background: #2a2a2a; }
        .debug-panel { background: #1a1a1a; padding: 8px; margin: 8px; border-radius: 8px; font-size: 10px; color: #888; font-family: monospace; }
        .call-notification { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1a1a1a; border: 2px solid #4caf50; border-radius: 16px; padding: 16px 24px; z-index: 1001; }
        .call-window { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .video-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; padding: 20px; }
        video { width: 400px; max-width: 45vw; background: #1a1a1a; border-radius: 16px; transform: scaleX(-1); }
        .call-controls { margin-top: 20px; display: flex; gap: 16px; }
        .call-controls button { padding: 12px 24px; border: none; border-radius: 30px; font-size: 16px; cursor: pointer; background: #2a2a2a; color: white; }
        .call-controls button.end-call { background: #f44336; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0c0c0c; }
        ::-webkit-scrollbar-thumb { background: #4caf50; border-radius: 10px; }
    </style>
</head>
<body>
<div class="app" id="app">
    <div class="sidebar">

<script type="module">
    import { initializeApp } from "firebase/app";
    import { 
        getAuth, 
        signInWithEmailAndPassword, 
        createUserWithEmailAndPassword, 
        sendEmailVerification, 
        sendPasswordResetEmail, 
        signOut, 
        onAuthStateChanged,
        GoogleAuthProvider,
        signInWithPopup
    } from "firebase/auth";
    import { getDatabase, ref, set, update, onValue, off, onDisconnect, get } from "firebase/database";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, addDoc, onSnapshot, orderBy, query } from "firebase/firestore";
    import { getAnalytics } from "firebase/analytics";

    const firebaseConfig = {
        apiKey: "AIzaSyCTaSvtnrqyUpsV-30UxBnZZUxkwoKShAg",
        authDomain: "wwmessenger-7c090.firebaseapp.com",
        databaseURL: "https://wwmessenger-7c090-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "wwmessenger-7c090",
        storageBucket: "wwmessenger-7c090.firebasestorage.app",
        messagingSenderId: "718456485964",
        appId: "1:718456485964:web:c2ac493e8c6756e3341ce9",
        measurementId: "G-K07HLL3FWD"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const analytics = getAnalytics(app);
    const rtdb = getDatabase(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();
    
    googleProvider.addScope('profile');
    googleProvider.addScope('email');
    
    // ==================== ПЕРЕМЕННЫЕ ====================
    let currentUser = null;
    let currentUserData = null;
    let currentChatId = null;
    let currentChatPeerId = null;
    let currentChatPeerName = null;
    let chats = [];
    let onlineStatuses = new Map();
    let usersCache = new Map();
    let typingRef = null;
    let typingTimeout = null;
    let presenceInterval = null;
    let heartbeatInterval = null;
    let unsubscribeMessages = null;
    let currentSearchType = 'uid';
    let allUsersList = [];
    
    // WebRTC переменные
    let peerConnection = null;
    let localStream = null;
    let currentCallId = null;
    let callType = null;
    let callListeners = [];
    
    const configuration = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' },
            { urls: 'stun:stun3.l.google.com:19302' },
            { urls: 'stun:stun4.l.google.com:19302' }
        ]
    };
    
    // ==================== ВСПОМОГАТЕЛЬНЫЕ ====================
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    
    function compressAvatar(file, maxSize = 80) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = maxSize;
                    canvas.height = maxSize;
                    ctx.drawImage(img, 0, 0, maxSize, maxSize);
                    const compressed = canvas.toDataURL('image/jpeg', 0.6);
                    resolve(compressed);
                };
                img.onerror = reject;
                img.src = e.target.result;
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }
    
    function updateDebug(message) {
        const debugPanel = document.getElementById('debugPanel');
        if (debugPanel) {
            const time = new Date().toLocaleTimeString();
            debugPanel.innerHTML = `🔍 [${time}] ${message}<br>👤 Ваш UID: ${currentUser?.uid?.substring(0, 12)}...`;
        }
    }
    
    // ==================== HEARTBEAT ====================
    function startHeartbeat() {
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        const heartbeatRef = ref(rtdb, `heartbeats/${currentUser.uid}`);
        onDisconnect(heartbeatRef).remove();
        heartbeatInterval = setInterval(async () => {
            try {
                await set(heartbeatRef, { timestamp: Date.now() });
                await update(ref(rtdb, `users/${currentUser.uid}`), { status: 'online', lastSeen: Date.now() });
            } catch(err) { console.warn("Heartbeat error:", err); }
        }, 10000);
    }
    
    // ==================== АУТЕНТИФИКАЦИЯ ====================
    function showAuthModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h2>🔐 Ww Мессенджер</h2>
                <button id="googleSignInBtn" class="google-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Войти через Google
                </button>
                <div class="divider"><span>или</span></div>
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <button id="loginTabBtn" style="flex:1; background:#4caf50;">Вход</button>
                    <button id="registerTabBtn" style="flex:1; background:#3a3a3a;">Регистрация</button>
                </div>
                <div id="loginForm">
                    <input type="email" id="loginEmail" placeholder="Email">
                    <input type="password" id="loginPassword" placeholder="Пароль">
                    <button id="forgotPasswordBtn" class="secondary" style="background:#3a3a3a;">🔑 Забыли пароль?</button>
                    <button id="loginBtn">🔑 Войти</button>
                </div>
                <div id="registerForm" style="display:none;">
                    <input type="text" id="regName" placeholder="Ваше имя">
                    <input type="email" id="regEmail" placeholder="Email">
                    <input type="password" id="regPassword" placeholder="Пароль (мин. 6 символов)">
                    <button id="registerBtn">📝 Зарегистрироваться</button>
                </div>
                <button id="closeAuthBtn" class="secondary" style="background:#3a3a3a; margin-top:10px;">Закрыть</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        const loginTab = modal.querySelector('#loginTabBtn');
        const registerTab = modal.querySelector('#registerTabBtn');
        const loginForm = modal.querySelector('#loginForm');
        const registerForm = modal.querySelector('#registerForm');
        
        loginTab.onclick = () => { loginTab.style.background = '#4caf50'; registerTab.style.background = '#3a3a3a'; loginForm.style.display = 'block'; registerForm.style.display = 'none'; };
        registerTab.onclick = () => { registerTab.style.background = '#4caf50'; loginTab.style.background = '#3a3a3a'; loginForm.style.display = 'none'; registerForm.style.display = 'block'; };
        
        modal.querySelector('#googleSignInBtn').onclick = async () => {
            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;
                const userRef = ref(rtdb, `users/${user.uid}`);
                const snapshot = await new Promise((resolve) => { onValue(userRef, resolve, { onlyOnce: true }); });
                if (!snapshot.exists()) {
                    await set(ref(rtdb, `users/${user.uid}`), {
                        email: user.email,
                        name: user.displayName || user.email.split('@')[0],
                        status: 'online',
                        lastSeen: Date.now(),
                        avatarBase64: user.photoURL || null,
                        bio: ''
                    });
                }
                modal.remove();
            } catch(err) { alert("Ошибка: " + err.message); }
        };
        
        modal.querySelector('#forgotPasswordBtn').onclick = async () => {
            const email = modal.querySelector('#loginEmail').value.trim();
            if (!email) { alert("Введите email"); return; }
            try { await sendPasswordResetEmail(auth, email); alert("✅ Письмо отправлено!"); } 
            catch(err) { alert("Ошибка: " + err.message); }
        };
        
        modal.querySelector('#loginBtn').onclick = async () => {
            const email = modal.querySelector('#loginEmail').value.trim();
            const password = modal.querySelector('#loginPassword').value;
            if (!email || !password) { alert("Заполните поля"); return; }
            try {
                const result = await signInWithEmailAndPassword(auth, email, password);
                if (!result.user.emailVerified) {
                    alert("⚠️ Подтвердите email!");
                    await sendEmailVerification(result.user);
                    await signOut(auth);
                    return;
                }
                modal.remove();
            } catch(err) { alert("Ошибка: " + err.message); }
        };
        
        modal.querySelector('#registerBtn').onclick = async () => {
            const name = modal.querySelector('#regName').value.trim();
            const email = modal.querySelector('#regEmail').value.trim();
            const password = modal.querySelector('#regPassword').value;
            if (!name || !email || !password) { alert("Заполните поля"); return; }
            if (password.length < 6) { alert("Пароль минимум 6 символов"); return; }
            try {
                const result = await createUserWithEmailAndPassword(auth, email, password);
                await sendEmailVerification(result.user);
                await set(ref(rtdb, `users/${result.user.uid}`), {
                    email: email, name: name, status: 'offline', lastSeen: Date.now(), avatarBase64: null, bio: ''
                });
                alert("✅ Регистрация успешна! Подтвердите email.");
                await signOut(auth);
            } catch(err) { alert("Ошибка: " + err.message); }
        };
        modal.querySelector('#closeAuthBtn').onclick = () => modal.remove();
    }
    
    async function loadUserData() {
        const userRef = ref(rtdb, `users/${currentUser.uid}`);
        const snapshot = await new Promise((resolve) => { onValue(userRef, resolve, { onlyOnce: true }); });
        if (snapshot.exists()) { currentUserData = snapshot.val(); } 
        else {
            currentUserData = { name: currentUser.displayName || currentUser.email.split('@')[0], email: currentUser.email, avatarBase64: currentUser.photoURL || null, bio: '' };
            await set(ref(rtdb, `users/${currentUser.uid}`), currentUserData);
        }
        updateProfileUI();
    }
    
    async function updateStatus(status) {
        try { await update(ref(rtdb, `users/${currentUser.uid}`), { status: status, lastSeen: Date.now() }); } 
        catch(err) { console.warn(err); }
    }
    
    function startPresence() {
        updateStatus('online');
        startHeartbeat();
        if (presenceInterval) clearInterval(presenceInterval);
        presenceInterval = setInterval(() => updateStatus('online'), 30000);
        window.addEventListener('beforeunload', () => updateStatus('offline'));
        
        const usersRef = ref(rtdb, 'users');
        onValue(usersRef, (snapshot) => {
            const users = snapshot.val() || {};
            allUsersList = [];
            updateDebug(`Загружено пользователей: ${Object.keys(users).length}`);
            
            for (const [uid, data] of Object.entries(users)) {
                if (uid !== currentUser.uid) {
                    const isOnline = data.status === 'online' && (Date.now() - (data.lastSeen || 0) < 60000);
                    onlineStatuses.set(uid, isOnline);
                    usersCache.set(uid, { name: data.name, email: data.email, avatarBase64: data.avatarBase64, bio: data.bio, uid: uid });
                    allUsersList.push({ uid: uid, name: data.name, email: data.email, avatarBase64: data.avatarBase64 });
                }
            }
            renderChatsList();
            if (currentChatPeerId) {
                const isOnline = onlineStatuses.get(currentChatPeerId) || false;
                document.getElementById('peerStatus').innerHTML = isOnline ? '🟢 В сети' : '⚪ Не в сети';
                document.getElementById('peerStatus').className = isOnline ? 'peer-status connected' : 'peer-status';
                document.getElementById('callButtons').style.display = isOnline ? 'flex' : 'none';
            }
        });
    }
    
    async function loadUserChats() {
        const userChatsRef = doc(db, 'users', currentUser.uid);
        const docSnap = await getDoc(userChatsRef);
        if (docSnap.exists()) {
            const data = docSnap.data();
            const chatIds = Object.values(data);
            chats = [];
            for (const chatId of chatIds) {
                const chatDoc = await getDoc(doc(db, 'chats', chatId));
                if (chatDoc.exists()) {
                    const chatData = chatDoc.data();
                    const peerId = chatData.participants.find(p => p !== currentUser.uid);
                    const peerInfo = usersCache.get(peerId) || { name: 'Загрузка...', email: '', uid: peerId };
                    chats.push({
                        chatId: chatId, peerId: peerId, peerName: peerInfo.name, peerEmail: peerInfo.email,
                        peerAvatar: peerInfo.avatarBase64, lastMessage: chatData.lastMessage || '', lastTime: chatData.lastTime || 0
                    });
                }
            }
            chats.sort((a,b) => (b.lastTime || 0) - (a.lastTime || 0));
        }
        renderChatsList();
    }
    
    async function createOrGetChat(peerId) {
        const userChatsRef = doc(db, 'users', currentUser.uid);
        const userDoc = await getDoc(userChatsRef);
        if (userDoc.exists()) {
            const data = userDoc.data();
            for (const [key, chatId] of Object.entries(data)) {
                const chatDoc = await getDoc(doc(db, 'chats', chatId));
                if (chatDoc.exists() && chatDoc.data().participants.includes(peerId)) return chatId;
            }
        }
        const chatId = `chat_${Date.now()}_${Math.random().toString(36).substr(2, 8)}`;
        await setDoc(doc(db, 'chats', chatId), { participants: [currentUser.uid, peerId], createdAt: Date.now(), lastMessage: '', lastTime: 0 });
        await setDoc(userChatsRef, { [peerId]: chatId }, { merge: true });
        await setDoc(doc(db, 'users', peerId), { [currentUser.uid]: chatId }, { merge: true });
        return chatId;
    }
    
    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !currentChatId) return;
        const message = { text: text, senderId: currentUser.uid, senderName: currentUserData.name, timestamp: Date.now(), time: new Date().toLocaleTimeString().slice(0,5) };
        await addDoc(collection(db, 'chats', currentChatId, 'messages'), message);
        await updateDoc(doc(db, 'chats', currentChatId), { lastMessage: text, lastTime: Date.now() });
        input.value = '';
    }
    
    function openChat(chatId, peerId, peerName, peerAvatar) {
        if (unsubscribeMessages) unsubscribeMessages();
        currentChatId = chatId;
        currentChatPeerId = peerId;
        currentChatPeerName = peerName;
        
        document.getElementById('chatName').innerText = peerName;
        document.getElementById('chatAvatar').innerHTML = peerAvatar ? `<img src="${peerAvatar}">` : peerName.charAt(0).toUpperCase();
        const isOnline = onlineStatuses.get(peerId) || false;
        document.getElementById('peerStatus').innerHTML = isOnline ? '🟢 В сети' : '⚪ Не в сети';
        document.getElementById('peerStatus').className = isOnline ? 'peer-status connected' : 'peer-status';
        document.getElementById('callButtons').style.display = isOnline ? 'flex' : 'none';
        document.getElementById('messageInput').disabled = false;
        document.getElementById('sendBtn').disabled = false;
        
        const messagesRef = collection(db, 'chats', chatId, 'messages');
        const q = query(messagesRef, orderBy('timestamp', 'asc'));
        unsubscribeMessages = onSnapshot(q, (snapshot) => {
            const msgs = []; snapshot.forEach(doc => msgs.push(doc.data()));
            renderMessages(msgs);
        });
        
        if (typingRef) off(typingRef);
        typingRef = ref(rtdb, `typing/${chatId}/${peerId}`);
        onValue(typingRef, (snapshot) => {
            if (snapshot.val()) {
                document.getElementById('typingIndicator').style.display = 'block';
                document.getElementById('typingIndicator').innerHTML = `${peerName} печатает...`;
                setTimeout(() => document.getElementById('typingIndicator').style.display = 'none', 2000);
            }
        });
        renderChatsList();
    }
    
    function sendTyping() {
        if (!currentChatId || !currentChatPeerId) return;
        const typingRefSend = ref(rtdb, `typing/${currentChatId}/${currentUser.uid}`);
        set(typingRefSend, true);
        if (typingTimeout) clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => set(typingRefSend, null), 2000);
    }
    
    function renderMessages(msgs) {
        const container = document.getElementById('messagesArea');
        if (msgs.length === 0) { container.innerHTML = '<div class="no-items" style="margin-top:60px;">💬 Напишите первое сообщение!</div>'; return; }
        container.innerHTML = '';
        msgs.forEach(msg => {
            const isOutgoing = msg.senderId === currentUser.uid;
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isOutgoing ? 'outgoing' : 'incoming'}`;
            msgDiv.innerHTML = `<div class="message-text">${escapeHtml(msg.text)}</div><div class="message-time">${msg.time}</div>`;
            container.appendChild(msgDiv);
        });
        container.scrollTop = container.scrollHeight;
    }
    
    // ==================== ПОИСК (ПРЯМОЙ В БАЗЕ) ====================
    async function searchUsersDirect(query, searchType) {
        if (!query.trim()) return [];
        
        updateDebug(`Поиск: "${query}" (тип: ${searchType})`);
        const results = [];
        const searchLower = query.toLowerCase().trim();
        
        // Получаем всех пользователей из базы напрямую
        const usersRef = ref(rtdb, 'users');
        const snapshot = await get(usersRef);
        const users = snapshot.val() || {};
        
        updateDebug(`Всего пользователей в БД: ${Object.keys(users).length}`);
        
        for (const [uid, data] of Object.entries(users)) {
            if (uid === currentUser.uid) continue;
            
            if (searchType === 'uid') {
                // Точное совпадение или частичное по UID
                if (uid.toLowerCase() === searchLower || uid.toLowerCase().includes(searchLower)) {
                    results.push({ uid, name: data.name || 'Без имени', email: data.email, avatarBase64: data.avatarBase64 });
                    updateDebug(`✅ Найден UID: ${uid.substring(0, 8)}... (${data.name})`);
                }
            } else if (searchType === 'name') {
                if (data.name && data.name.toLowerCase().includes(searchLower)) {
                    results.push({ uid, name: data.name, email: data.email, avatarBase64: data.avatarBase64 });
                    updateDebug(`✅ Найден по имени: ${data.name} (${uid.substring(0, 8)}...)`);
                }
            }
        }
        
        updateDebug(`Результатов поиска: ${results.length}`);
        return results;
    }
    
    async function renderSearchResults(query) {
        const results = await searchUsersDirect(query, currentSearchType);
        let container = document.getElementById('searchResults');
        if (!container) {
            container = document.createElement('div');
            container.id = 'searchResults';
            container.className = 'search-results';
            document.querySelector('.search-container').appendChild(container);
        }
        
        if (!query.trim()) { container.innerHTML = ''; return; }
        
        if (results.length === 0) {
            container.innerHTML = '<div class="search-result-item" style="justify-content:center;color:#666;">❌ Пользователь не найден<br><span style="font-size:10px;">Проверьте правильность UID</span></div>';
            return;
        }
        
        container.innerHTML = results.map(user => `
            <div class="search-result-item" data-user-id="${user.uid}">
                <div class="avatar" style="width:40px;height:40px;">${user.avatarBase64 ? `<img src="${user.avatarBase64}">` : (user.name ? user.name.charAt(0).toUpperCase() : '?')}</div>
                <div style="flex:1;">
                    <div><strong>${escapeHtml(user.name || 'Без имени')}</strong></div>
                    <div style="font-size:10px;color:#888;font-family:monospace;">UID: ${user.uid.substring(0, 10)}...</div>
                    <div style="font-size:9px;color:#666;">${user.email || ''}</div>
                </div>
                <button style="background:#4caf50;border:none;padding:6px 12px;border-radius:20px;cursor:pointer;">➕ Написать</button>
            </div>
        `).join('');
        
        document.querySelectorAll('.search-result-item').forEach(el => {
            el.onclick = async () => {
                const peerId = el.dataset.userId;
                const peerInfo = usersCache.get(peerId) || { name: 'Пользователь', avatarBase64: null };
                const chatId = await createOrGetChat(peerId);
                await loadUserChats();
                openChat(chatId, peerId, peerInfo?.name || 'Пользователь', peerInfo?.avatarBase64);
                document.getElementById('searchInput').value = '';
                container.innerHTML = '';
            };
        });
    }
    
    function renderChatsList() {
        const container = document.getElementById('chatsList');
        if (chats.length === 0) { container.innerHTML = '<div class="no-items">✨ Нет чатов<br>Найдите друга по UID</div>'; return; }
        container.innerHTML = '';
        for (const chat of chats) {
            const isOnline = onlineStatuses.get(chat.peerId) || false;
            const div = document.createElement('div');
            div.className = `chat-item ${currentChatId === chat.chatId ? 'active' : ''}`;
            div.innerHTML = `
                <div class="chat-avatar" style="position:relative;">
                    ${chat.peerAvatar ? `<img src="${chat.peerAvatar}">` : (chat.peerName ? chat.peerName.charAt(0).toUpperCase() : '?')}
                    ${isOnline ? '<div class="online-dot"></div>' : ''}
                </div>
                <div class="chat-details">
                    <div class="chat-name">${escapeHtml(chat.peerName || 'Пользователь')}</div>
                    <div style="font-size:9px;color:#666;font-family:monospace;">${chat.peerId.substring(0, 10)}...</div>
                    <div class="chat-last-msg">${escapeHtml(chat.lastMessage || 'Новый чат')}</div>
                </div>
            `;
            div.onclick = () => openChat(chat.chatId, chat.peerId, chat.peerName, chat.peerAvatar);
            container.appendChild(div);
        }
    }
    
    function updateProfileUI() {
        if (!currentUserData) return;
        document.getElementById('userName').innerText = currentUserData.name || 'Пользователь';
        document.getElementById('userBio').innerText = currentUserData.bio || 'Нет описания';
        document.getElementById('userEmail').innerText = currentUser.email;
        const avatarDiv = document.getElementById('userAvatar');
        if (currentUserData.avatarBase64) avatarDiv.innerHTML = `<img src="${currentUserData.avatarBase64}">`;
        else avatarDiv.innerHTML = currentUserData.name?.charAt(0).toUpperCase() || 'W';
    }
    
    function showEditProfileModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h2>✏️ Редактировать профиль</h2>
                <input type="text" id="editName" placeholder="Имя" value="${escapeHtml(currentUserData.name || '')}">
                <textarea id="editBio" placeholder="Описание" rows="3">${escapeHtml(currentUserData.bio || '')}</textarea>
                <div class="avatar-upload">
                    <div class="avatar-preview" id="avatarPreview">${currentUserData.avatarBase64 ? `<img src="${currentUserData.avatarBase64}">` : `<span style="font-size:48px;">${currentUserData.name?.charAt(0).toUpperCase() || 'W'}</span>`}</div>
                    <label class="file-input-label">📸 Загрузить фото<input type="file" id="avatarUpload" accept="image/*" style="display:none;"></label>
                </div>
                <div class="my-id-display"><strong>🆔 Ваш UID:</strong><br><span style="font-family:monospace;font-size:11px;word-break:break-all;">${currentUser.uid}</span><button id="copyUidBtn" style="margin-top:8px;padding:6px;font-size:12px;">📋 Копировать</button></div>
                <button id="saveProfileBtn">💾 Сохранить</button>
                <button id="logoutBtn" class="danger">🚪 Выйти</button>
                <button id="closeProfileBtn" class="secondary">Закрыть</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        const fileInput = modal.querySelector('#avatarUpload');
        const preview = modal.querySelector('#avatarPreview');
        modal.querySelector('#copyUidBtn').onclick = () => { navigator.clipboard.writeText(currentUser.uid); alert("✅ UID скопирован!"); };
        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (file) {
                const compressed = await compressAvatar(file, 80);
                await update(ref(rtdb, `users/${currentUser.uid}`), { avatarBase64: compressed });
                currentUserData.avatarBase64 = compressed;
                preview.innerHTML = `<img src="${compressed}">`;
                updateProfileUI();
            }
        };
        modal.querySelector('#saveProfileBtn').onclick = async () => {
            const newName = modal.querySelector('#editName').value.trim();
            const newBio = modal.querySelector('#editBio').value.trim();
            if (newName) currentUserData.name = newName;
            currentUserData.bio = newBio;
            await update(ref(rtdb, `users/${currentUser.uid}`), { name: currentUserData.name, bio: currentUserData.bio });
            updateProfileUI();
            modal.remove();
        };
        modal.querySelector('#logoutBtn').onclick = async () => {
            await updateStatus('offline');
            if (heartbeatInterval) clearInterval(heartbeatInterval);
            await signOut(auth);
            location.reload();
        };
        modal.querySelector('#closeProfileBtn').onclick = () => modal.remove();
    }
    
    // ==================== WEBRTC ЗВОНКИ ====================
    async function startCall(isVideo) {
        if (!currentChatPeerId) return;
        callType = isVideo ? 'video' : 'audio';
        
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: isVideo });
            createCallWindow(isVideo);
            
            peerConnection = new RTCPeerConnection(configuration);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    const candidatesRef = ref(rtdb, `calls/${currentCallId}/iceCandidates/${Date.now()}`);
                    set(candidatesRef, { candidate: event.candidate.candidate, sdpMid: event.candidate.sdpMid, sdpMLineIndex: event.candidate.sdpMLineIndex });
                }
            };
            
            peerConnection.ontrack = (event) => {
                const remoteVideo = document.getElementById('remoteVideo');
                if (remoteVideo && event.streams[0]) remoteVideo.srcObject = event.streams[0];
            };
            
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            
            currentCallId = `call_${Date.now()}_${Math.random().toString(36).substr(2, 6)}`;
            const callRef = ref(rtdb, `calls/${currentCallId}`);
            await set(callRef, {
                from: currentUser.uid,
                to: currentChatPeerId,
                status: 'waiting',
                offer: { type: offer.type, sdp: offer.sdp },
                type: callType,
                timestamp: Date.now()
            });
            
            listenForCallResponse();
        } catch (err) {
            console.error("Start call error:", err);
            alert("Не удалось получить доступ к микрофону/камере");
        }
    }
    
    function listenForCallResponse() {
        const callRef = ref(rtdb, `calls/${currentCallId}`);
        const listener = onValue(callRef, async (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            
            if (data.status === 'answered' && data.answer) {
                off(listener);
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            } else if (data.status === 'rejected') {
                off(listener);
                endCall();
                alert("Звонок отклонен");
            } else if (data.status === 'ended') {
                off(listener);
                endCall();
            }
        });
        callListeners.push(listener);
    }
    
    function listenForIncomingCalls() {
        const callsRef = ref(rtdb, 'calls');
        onValue(callsRef, (snapshot) => {
            const calls = snapshot.val();
            if (!calls) return;
            
            for (const [callId, call] of Object.entries(calls)) {
                if (call.to === currentUser.uid && call.status === 'waiting' && !currentCallId) {
                    showIncomingCallNotification(callId, call);
                }
            }
        });
    }
    
    function showIncomingCallNotification(callId, call) {
        const notification = document.createElement('div');
        notification.className = 'call-notification';
        notification.innerHTML = `
            <div>📞 ${call.type === 'video' ? 'Видеозвонок' : 'Аудиозвонок'}</div>
            <div style="margin-top: 10px;">
                <button class="accept">✅ Принять</button>
                <button class="reject">❌ Отклонить</button>
            </div>
        `;
        document.body.appendChild(notification);
        
        notification.querySelector('.accept').onclick = async () => {
            notification.remove();
            await acceptCall(callId, call);
        };
        notification.querySelector('.reject').onclick = async () => {
            notification.remove();
            await update(ref(rtdb, `calls/${callId}`), { status: 'rejected' });
        };
        
        setTimeout(() => { if (notification.parentNode) notification.remove(); }, 30000);
    }
    
    async function acceptCall(callId, call) {
        currentCallId = callId;
        callType = call.type;
        
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: call.type === 'video' });
            createCallWindow(call.type === 'video');
            
            peerConnection = new RTCPeerConnection(configuration);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    const candidatesRef = ref(rtdb, `calls/${currentCallId}/iceCandidates/${Date.now()}`);
                    set(candidatesRef, { candidate: event.candidate.candidate, sdpMid: event.candidate.sdpMid, sdpMLineIndex: event.candidate.sdpMLineIndex });
                }
            };
            
            peerConnection.ontrack = (event) => {
                const remoteVideo = document.getElementById('remoteVideo');
                if (remoteVideo && event.streams[0]) remoteVideo.srcObject = event.streams[0];
            };
            
            await peerConnection.setRemoteDescription(new RTCSessionDescription(call.offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            
            await update(ref(rtdb, `calls/${callId}`), { status: 'answered', answer: { type: answer.type, sdp: answer.sdp } });
            
            // Слушаем ICE кандидаты
            const candidatesRef = ref(rtdb, `calls/${callId}/iceCandidates`);
            onValue(candidatesRef, (snapshot) => {
                const candidates = snapshot.val();
                if (candidates && peerConnection) {
                    for (const [key, cand] of Object.entries(candidates)) {
                        peerConnection.addIceCandidate(new RTCIceCandidate(cand));
                    }
                }
            });
        } catch (err) {
            console.error("Accept call error:", err);
        }
    }
    
    function createCallWindow(isVideo) {
        const existing = document.getElementById('callWindow');
        if (existing) existing.remove();
        
        const window = document.createElement('div');
        window.id = 'callWindow';
        window.className = 'call-window';
        window.innerHTML = `
            <div class="video-container">
                ${isVideo ? '<video id="localVideo" autoplay muted playsinline></video>' : '<div style="text-align:center;padding:40px;">🎤 Аудиозвонок...</div>'}
                ${isVideo ? '<video id="remoteVideo" autoplay playsinline></video>' : ''}
            </div>
            <div class="call-controls">
                <button id="endCallBtn" class="end-call">🔴 Завершить</button>
                ${!isVideo ? '<button id="muteBtn">🔇 Выкл. микрофон</button>' : ''}
            </div>
        `;
        document.body.appendChild(window);
        
        if (isVideo && localStream) {
            const localVideo = document.getElementById('localVideo');
            if (localVideo) localVideo.srcObject = localStream;
        }
        
        document.getElementById('endCallBtn').onclick = () => endCall();
        if (!isVideo) {
            let muted = false;
            document.getElementById('muteBtn').onclick = () => {
                if (localStream) {
                    muted = !muted;
                    localStream.getAudioTracks()[0].enabled = !muted;
                    document.getElementById('muteBtn').innerHTML = muted ? '🎤 Вкл. микрофон' : '🔇 Выкл. микрофон';
                }
            };
        }
    }
    
    async function endCall() {
        if (currentCallId) {
            await update(ref(rtdb, `calls/${currentCallId}`), { status: 'ended' });
        }
        if (peerConnection) peerConnection.close();
        if (localStream) localStream.getTracks().forEach(track => track.stop());
        const callWindow = document.getElementById('callWindow');
        if (callWindow) callWindow.remove();
        peerConnection = null;
        localStream = null;
        currentCallId = null;
        callListeners.forEach(listener => off(listener));
        callListeners = [];
    }
    
    // ==================== ИНИЦИАЛИЗАЦИЯ ====================
    async function initApp() {
        document.getElementById('connectionStatus').className = 'connection-status online';
        document.getElementById('connectionStatus').innerHTML = '🟢 Онлайн';
        updateProfileUI();
        startPresence();
        listenForIncomingCalls();
        
        await loadUserChats();
        
        const searchInput = document.getElementById('searchInput');
        searchInput.placeholder = "🔍 Введите UID друга (полностью или частично)";
        searchInput.addEventListener('input', (e) => renderSearchResults(e.target.value));
        document.getElementById('searchBtn').onclick = () => renderSearchResults(searchInput.value);
        
        document.querySelectorAll('.search-type-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.search-type-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSearchType = btn.dataset.searchType;
                searchInput.placeholder = currentSearchType === 'uid' ? "🔍 Введите UID друга" : "👤 Введите имя пользователя";
                renderSearchResults(searchInput.value);
            };
        });
        
        document.getElementById('audioCallBtn').onclick = () => startCall(false);
        document.getElementById('videoCallBtn').onclick = () => startCall(true);
        
        updateDebug(`Готов к работе! Ваш UID: ${currentUser.uid.substring(0, 12)}...`);
    }
    
    function bindEvents() {
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('messageInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); else sendTyping(); });
        document.getElementById('userProfileBtn').onclick = showEditProfileModal;
    }
    
    bindEvents();
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            await loadUserData();
            initApp();
        } else {
            showAuthModal();
        }
    });
</script>
