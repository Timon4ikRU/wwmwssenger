<!DOCTYPE html>
<html lang="ru">
<head>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js",

    <style>

        .app { display: flex; height: 100vh; width: 100%; }
        .sidebar { width: 320px; background: #0c0c0c; border-right: 1px solid #1f1f1f; display: flex; flex-direction: column; }
        .sidebar-header { padding: 16px 20px; background: #050505; border-bottom: 1px solid #1f1f1f; display: flex; justify-content: space-between; align-items: center; }
        .logo span { background: #fff; color: #000; padding: 4px 14px; border-radius: 20px; font-size: 26px; font-weight: 900; }
        .connection-status { font-size: 11px; padding: 4px 10px; border-radius: 20px; background: #2a2a2a; }
        .connection-status.online { background: #4caf50; }
        .search-container { padding: 12px 16px; border-bottom: 1px solid #1f1f1f; display: flex; gap: 8px; }
        .search-input { flex: 1; padding: 10px 16px; background: #1a1a1a; border: 1px solid #2c2c2c; color: white; border-radius: 24px; outline: none; font-size: 14px; }
        .search-btn { background: #4caf50; border: none; color: white; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; font-size: 20px; }
        .user-profile { padding: 16px 20px; display: flex; align-items: center; gap: 14px; background: #080808; border-bottom: 1px solid #1f1f1f; cursor: pointer; }
        .avatar { width: 52px; height: 52px; border-radius: 50%; background: #202020; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: bold; overflow: hidden; flex-shrink: 0; position: relative; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .user-info { flex: 1; min-width: 0; }
        .user-name { font-weight: 700; font-size: 15px; }
        .user-bio { font-size: 11px; color: #888; margin-top: 2px; }

        .chat-area { flex: 1; display: flex; flex-direction: column; background: #0a0a0a; }

        .message.outgoing { background: #2b6e4c; align-self: flex-end; border-bottom-right-radius: 5px; }
        .message.incoming { background: #202020; align-self: flex-start; border-bottom-left-radius: 5px; }
        .message-text { font-size: 14px; word-wrap: break-word; }
        .message-time { font-size: 10px; color: #aaa; margin-top: 5px; text-align: right; }
        .input-area { padding: 16px 20px; background: #0e0e0e; border-top: 1px solid #202020; display: flex; gap: 14px; }
        .message-input { flex: 1; padding: 12px 18px; background: #1a1a1a; border: 1px solid #2c2c2c; color: white; border-radius: 32px; outline: none; }

        .modal-content { background: #131313; padding: 32px; border-radius: 32px; width: 460px; max-width: 90%; max-height: 85vh; overflow-y: auto; }
        .modal-content h2 { margin-bottom: 20px; font-size: 24px; text-align: center; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 14px; margin: 10px 0; background: #1a1a1a; border: 1px solid #2c2c2c; color: white; border-radius: 18px; font-size: 14px; }
        .modal-content button { width: 100%; padding: 14px; margin-top: 16px; background: #4caf50; border: none; color: white; border-radius: 30px; cursor: pointer; font-size: 16px; font-weight: 600; transition: all 0.2s; }
        .modal-content button:hover { opacity: 0.9; transform: translateY(-1px); }
        .modal-content button.secondary { background: #3a3a3a; }
        .modal-content button.danger { background: #c42e2e; }
        .google-btn { background: #fff; color: #000; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .google-btn:hover { background: #f0f0f0; }
        .divider { display: flex; align-items: center; text-align: center; margin: 20px 0; color: #666; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #2c2c2c; }
        .divider span { margin: 0 10px; font-size: 12px; }
        .avatar-upload { text-align: center; margin: 20px 0; }
        .avatar-preview { width: 100px; height: 100px; border-radius: 50%; background: #2a2a2a; margin: 0 auto 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .avatar-preview img { width: 100%; height: 100%; object-fit: cover; }
        .file-input-label { background: #4caf50; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 12px; display: inline-block; }
        .my-id-display { background: #1a1a1a; padding: 12px; border-radius: 16px; margin: 15px 0; word-break: break-all; font-size: 12px; text-align: center; }
        .my-id-display span { color: #4caf50; font-family: monospace; user-select: all; cursor: pointer; }
        .no-items { text-align: center; color: #666; padding: 40px 20px; font-size: 14px; }
        .typing-indicator { font-size: 12px; color: #888; padding: 8px 20px; font-style: italic; }
        .search-results { background: #1a1a1a; border-radius: 12px; margin-top: 8px; max-height: 200px; overflow-y: auto; }
        .search-result-item { padding: 10px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-bottom: 1px solid #2c2c2c; transition: background 0.2s; }
        .search-result-item:hover { background: #2a2a2a; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0c0c0c; }
        ::-webkit-scrollbar-thumb { background: #4caf50; border-radius: 10px; }

</head>
<body>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { 
        getAuth, 
        signInWithEmailAndPassword, 
        createUserWithEmailAndPassword, 
        sendEmailVerification, 
        sendPasswordResetEmail, 
        signOut, 
        onAuthStateChanged,
        GoogleAuthProvider,
        signInWithPopup
    } from "firebase/auth";
    import { getDatabase, ref, set, update, onValue, off, onDisconnect, get } from "firebase/database";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, addDoc, onSnapshot, orderBy, query as fsQuery, where } from "firebase/firestore";
    import { getAnalytics } from "firebase/analytics";

    const firebaseConfig = {
        apiKey: "AIzaSyCTaSvtnrqyUpsV-30UxBnZZUxkwoKShAg",
        authDomain: "wwmessenger-7c090.firebaseapp.com",
        databaseURL: "https://wwmessenger-7c090-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "wwmessenger-7c090",
        storageBucket: "wwmessenger-7c090.firebasestorage.app",
        messagingSenderId: "718456485964",
        appId: "1:718456485964:web:c2ac493e8c6756e3341ce9",
        measurementId: "G-K07HLL3FWD"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const analytics = getAnalytics(app);
    const rtdb = getDatabase(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();
    
    googleProvider.addScope('profile');
    googleProvider.addScope('email');
    
    // ==================== ПЕРЕМЕННЫЕ ====================
    let currentUser = null;
    let currentUserData = null;
    let currentChatId = null;
    let currentChatPeerId = null;
    let currentChatPeerName = null;
    let chats = [];
    let onlineStatuses = new Map();
    let usersCache = new Map();
    let typingRef = null;
    let typingTimeout = null;
    let presenceInterval = null;
    let heartbeatInterval = null;
    let unsubscribeMessages = null;
    let unsubscribeChats = null;
    
    // ==================== ВСПОМОГАТЕЛЬНЫЕ ====================
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    
    function compressAvatar(file, maxSize = 80) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = maxSize;
                    canvas.height = maxSize;
                    ctx.drawImage(img, 0, 0, maxSize, maxSize);
                    const compressed = canvas.toDataURL('image/jpeg', 0.6);
                    resolve(compressed);
                };
                img.onerror = reject;
                img.src = e.target.result;
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }
    
    // ==================== HEARTBEAT ====================
    function startHeartbeat() {
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        const heartbeatRef = ref(rtdb, `heartbeats/${currentUser.uid}`);
        onDisconnect(heartbeatRef).remove();
        heartbeatInterval = setInterval(async () => {
            try {
                await set(heartbeatRef, { timestamp: Date.now() });
                await update(ref(rtdb, `users/${currentUser.uid}`), { status: 'online', lastSeen: Date.now() });
            } catch(err) { console.warn("Heartbeat error:", err); }
        }, 10000);
    }
    
    // ==================== АУТЕНТИФИКАЦИЯ ====================
    function showAuthModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h2>🔐 Ww Мессенджер</h2>
                <button id="googleSignInBtn" class="google-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Войти через Google
                </button>
                <div class="divider"><span>или</span></div>
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <button id="loginTabBtn" style="flex:1; background:#4caf50;">Вход</button>
                    <button id="registerTabBtn" style="flex:1; background:#3a3a3a;">Регистрация</button>
                </div>
                <div id="loginForm">
                    <input type="email" id="loginEmail" placeholder="Email">
                    <input type="password" id="loginPassword" placeholder="Пароль">
                    <button id="forgotPasswordBtn" class="secondary" style="background:#3a3a3a;">🔑 Забыли пароль?</button>
                    <button id="loginBtn">🔑 Войти</button>
                </div>
                <div id="registerForm" style="display:none;">
                    <input type="text" id="regName" placeholder="Ваше имя">
                    <input type="email" id="regEmail" placeholder="Email">
                    <input type="password" id="regPassword" placeholder="Пароль (мин. 6 символов)">
                    <button id="registerBtn">📝 Зарегистрироваться</button>
                </div>
                <button id="closeAuthBtn" class="secondary" style="background:#3a3a3a; margin-top:10px;">Закрыть</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        const loginTab = modal.querySelector('#loginTabBtn');
        const registerTab = modal.querySelector('#registerTabBtn');
        const loginForm = modal.querySelector('#loginForm');
        const registerForm = modal.querySelector('#registerForm');
        
        loginTab.onclick = () => { loginTab.style.background = '#4caf50'; registerTab.style.background = '#3a3a3a'; loginForm.style.display = 'block'; registerForm.style.display = 'none'; };
        registerTab.onclick = () => { registerTab.style.background = '#4caf50'; loginTab.style.background = '#3a3a3a'; loginForm.style.display = 'none'; registerForm.style.display = 'block'; };
        
        modal.querySelector('#googleSignInBtn').onclick = async () => {
            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;
                const userRef = ref(rtdb, `users/${user.uid}`);
                const snapshot = await new Promise((resolve) => { onValue(userRef, resolve, { onlyOnce: true }); });
                if (!snapshot.exists()) {
                    await set(ref(rtdb, `users/${user.uid}`), {
                        email: user.email,
                        name: user.displayName || user.email.split('@')[0],
                        status: 'online',
                        lastSeen: Date.now(),
                        avatarBase64: user.photoURL || null,
                        bio: ''
                    });
                }
                modal.remove();
            } catch(err) { alert("Ошибка: " + err.message); }
        };
        
        modal.querySelector('#forgotPasswordBtn').onclick = async () => {
            const email = modal.querySelector('#loginEmail').value.trim();
            if (!email) { alert("Введите email"); return; }
            try { await sendPasswordResetEmail(auth, email); alert("✅ Письмо отправлено!"); } 
            catch(err) { alert("Ошибка: " + err.message); }
        };
        
        modal.querySelector('#loginBtn').onclick = async () => {
            const email = modal.querySelector('#loginEmail').value.trim();
            const password = modal.querySelector('#loginPassword').value;
            if (!email || !password) { alert("Заполните поля"); return; }
            try {
                const result = await signInWithEmailAndPassword(auth, email, password);
                if (!result.user.emailVerified) {
                    alert("⚠️ Подтвердите email!");
                    await sendEmailVerification(result.user);
                    await signOut(auth);
                    return;
                }
                modal.remove();
            } catch(err) { alert("Ошибка: " + err.message); }
        };
        
        modal.querySelector('#registerBtn').onclick = async () => {
            const name = modal.querySelector('#regName').value.trim();
            const email = modal.querySelector('#regEmail').value.trim();
            const password = modal.querySelector('#regPassword').value;
            if (!name || !email || !password) { alert("Заполните поля"); return; }
            if (password.length < 6) { alert("Пароль минимум 6 символов"); return; }
            try {
                const result = await createUserWithEmailAndPassword(auth, email, password);
                await sendEmailVerification(result.user);
                await set(ref(rtdb, `users/${result.user.uid}`), {
                    email: email, name: name, status: 'offline', lastSeen: Date.now(), avatarBase64: null, bio: ''
                });
                alert("✅ Регистрация успешна! Подтвердите email.");
                await signOut(auth);
            } catch(err) { alert("Ошибка: " + err.message); }
        };
        modal.querySelector('#closeAuthBtn').onclick = () => modal.remove();
    }
    
    async function loadUserData() {
        const userRef = ref(rtdb, `users/${currentUser.uid}`);
        const snapshot = await new Promise((resolve) => { onValue(userRef, resolve, { onlyOnce: true }); });
        if (snapshot.exists()) { currentUserData = snapshot.val(); } 
        else {
            currentUserData = { name: currentUser.displayName || currentUser.email.split('@')[0], email: currentUser.email, avatarBase64: currentUser.photoURL || null, bio: '' };
            await set(ref(rtdb, `users/${currentUser.uid}`), currentUserData);
        }
        updateProfileUI();
    }
    
    async function updateStatus(status) {
        try { await update(ref(rtdb, `users/${currentUser.uid}`), { status: status, lastSeen: Date.now() }); } 
        catch(err) { console.warn(err); }
    }
    
    function startPresence() {
        updateStatus('online');
        startHeartbeat();
        if (presenceInterval) clearInterval(presenceInterval);
        presenceInterval = setInterval(() => updateStatus('online'), 30000);
        window.addEventListener('beforeunload', () => updateStatus('offline'));
        
        // Слушаем статусы пользователей
        const usersRef = ref(rtdb, 'users');
        onValue(usersRef, (snapshot) => {
            const users = snapshot.val() || {};
            for (const [uid, data] of Object.entries(users)) {
                if (uid !== currentUser.uid) {
                    const isOnline = data.status === 'online' && (Date.now() - (data.lastSeen || 0) < 60000);
                    onlineStatuses.set(uid, isOnline);
                    usersCache.set(uid, { name: data.name, email: data.email, avatarBase64: data.avatarBase64, bio: data.bio, uid: uid });
                }
            }
            renderChatsList();
            if (currentChatPeerId) {
                const isOnline = onlineStatuses.get(currentChatPeerId) || false;
                document.getElementById('peerStatus').innerHTML = isOnline ? '🟢 В сети' : '⚪ Не в сети';
                document.getElementById('peerStatus').className = isOnline ? 'peer-status connected' : 'peer-status';
            }
        });
    }
    
    // ==================== ЧАТЫ FIRESTORE (С РЕАЛЬНЫМ ВРЕМЕНЕМ) ====================
    function subscribeToChats() {
        if (unsubscribeChats) unsubscribeChats();
        
        // Ищем все чаты, где пользователь участник
        const q = fsQuery(collection(db, 'chats'), where('participants', 'array-contains', currentUser.uid));
        
        unsubscribeChats = onSnapshot(q, async (snapshot) => {
            chats = [];
            for (const docSnap of snapshot.docs) {
                const chatData = docSnap.data();
                const peerId = chatData.participants.find(p => p !== currentUser.uid);
                const peerInfo = usersCache.get(peerId) || await loadUserInfo(peerId);
                
                chats.push({
                    chatId: docSnap.id,
                    peerId: peerId,
                    peerName: peerInfo?.name || 'Загрузка...',
                    peerEmail: peerInfo?.email || '',
                    peerAvatar: peerInfo?.avatarBase64 || null,
                    lastMessage: chatData.lastMessage || '',
                    lastTime: chatData.lastTime || 0
                });
            }
            chats.sort((a,b) => (b.lastTime || 0) - (a.lastTime || 0));
            renderChatsList();
        }, (error) => {
            console.error("Chats subscription error:", error);
        });
    }
    
    async function loadUserInfo(uid) {
        try {
            const userRef = ref(rtdb, `users/${uid}`);
            const snapshot = await get(userRef);
            if (snapshot.exists()) {
                const data = snapshot.val();
                usersCache.set(uid, data);
                return data;
            }
        } catch(err) {
            console.warn("Error loading user info:", err);
        }
        return null;
    }
    
    async function createOrGetChat(peerId) {
        try {
            // Проверяем существующий чат через Firestore
            const q = fsQuery(collection(db, 'chats'), where('participants', 'array-contains', currentUser.uid));
            const snapshot = await getDocs(q);
            
            for (const docSnap of snapshot.docs) {
                const participants = docSnap.data().participants;
                if (participants.includes(peerId)) {
                    return docSnap.id;
                }
            }
            
            // Создаем новый чат
            const chatId = `chat_${Date.now()}_${Math.random().toString(36).substr(2, 8)}`;
            await setDoc(doc(db, 'chats', chatId), {
                participants: [currentUser.uid, peerId],
                createdAt: Date.now(),
                lastMessage: '',
                lastTime: 0
            });
            
            return chatId;
        } catch(err) {
            console.error("Create chat error:", err);
            throw err;
        }
    }
    
    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !currentChatId) return;
        
        const message = {
            text: text,
            senderId: currentUser.uid,
            senderName: currentUserData.name,
            timestamp: Date.now(),
            time: new Date().toLocaleTimeString().slice(0,5)
        };
        
        try {
            await addDoc(collection(db, 'chats', currentChatId, 'messages'), message);
            await updateDoc(doc(db, 'chats', currentChatId), { lastMessage: text, lastTime: Date.now() });
            input.value = '';
        } catch(err) {
            console.error("Send message error:", err);
            alert("Ошибка отправки: " + err.message);
        }
    }
    
    function openChat(chatId, peerId, peerName, peerAvatar) {
        if (unsubscribeMessages) unsubscribeMessages();
        currentChatId = chatId;
        currentChatPeerId = peerId;
        currentChatPeerName = peerName;
        
        document.getElementById('chatName').innerText = peerName;
        document.getElementById('chatAvatar').innerHTML = peerAvatar ? `<img src="${peerAvatar}">` : (peerName?.charAt(0).toUpperCase() || '?');
        
        const isOnline = onlineStatuses.get(peerId) || false;
        document.getElementById('peerStatus').innerHTML = isOnline ? '🟢 В сети' : '⚪ Не в сети';
        document.getElementById('peerStatus').className = isOnline ? 'peer-status connected' : 'peer-status';
        document.getElementById('messageInput').disabled = false;
        document.getElementById('sendBtn').disabled = false;
        
        // Подписываемся на сообщения
        const messagesRef = collection(db, 'chats', chatId, 'messages');
        const q = fsQuery(messagesRef, orderBy('timestamp', 'asc'));
        unsubscribeMessages = onSnapshot(q, (snapshot) => {
            const msgs = [];
            snapshot.forEach(doc => msgs.push(doc.data()));
            renderMessages(msgs);
        }, (error) => {
            console.error("Messages subscription error:", error);
        });
        
        // Печатает...
        if (typingRef) off(typingRef);
        typingRef = ref(rtdb, `typing/${chatId}/${peerId}`);
        onValue(typingRef, (snapshot) => {
            if (snapshot.val()) {
                document.getElementById('typingIndicator').style.display = 'block';
                document.getElementById('typingIndicator').innerHTML = `${peerName} печатает...`;
                setTimeout(() => document.getElementById('typingIndicator').style.display = 'none', 2000);
            }
        });
        
        renderChatsList();
    }
    
    function sendTyping() {
        if (!currentChatId || !currentChatPeerId) return;
        const typingRefSend = ref(rtdb, `typing/${currentChatId}/${currentUser.uid}`);
        set(typingRefSend, true);
        if (typingTimeout) clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => set(typingRefSend, null), 2000);
    }
    
    function renderMessages(msgs) {
        const container = document.getElementById('messagesArea');
        if (msgs.length === 0) {
            container.innerHTML = '<div class="no-items" style="margin-top:60px;">💬 Напишите первое сообщение!</div>';
            return;
        }
        container.innerHTML = '';
        msgs.forEach(msg => {
            const isOutgoing = msg.senderId === currentUser.uid;
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isOutgoing ? 'outgoing' : 'incoming'}`;
            msgDiv.innerHTML = `<div class="message-text">${escapeHtml(msg.text)}</div><div class="message-time">${msg.time}</div>`;
            container.appendChild(msgDiv);
        });
        container.scrollTop = container.scrollHeight;
    }
    
    // ==================== ПОИСК ====================
    async function searchByUid(uid) {
        try {
            const userRef = ref(rtdb, `users/${uid}`);
            const snapshot = await get(userRef);
            if (snapshot.exists()) {
                const data = snapshot.val();
                return { uid, name: data.name, email: data.email, avatarBase64: data.avatarBase64 };
            }
        } catch(err) {
            console.warn("Search error:", err);
        }
        return null;
    }
    
    async function renderSearchResults(query) {
        const container = document.getElementById('searchResults');
        if (!query.trim()) { 
            container.innerHTML = ''; 
            return; 
        }
        
        container.innerHTML = '<div class="search-result-item" style="justify-content:center;">🔍 Поиск...</div>';
        
        const user = await searchByUid(query.trim());
        
        if (!user || user.uid === currentUser.uid) {
            container.innerHTML = '<div class="search-result-item" style="justify-content:center;color:#666;">❌ Пользователь не найден</div>';
            return;
        }
        
        container.innerHTML = `
            <div class="search-result-item" data-user-id="${user.uid}">
                <div class="avatar" style="width:40px;height:40px;">${user.avatarBase64 ? `<img src="${user.avatarBase64}">` : user.name.charAt(0).toUpperCase()}</div>
                <div style="flex:1;">
                    <div><strong>${escapeHtml(user.name)}</strong></div>
                    <div style="font-size:10px;color:#888;font-family:monospace;">UID: ${user.uid.substring(0, 10)}...</div>
                </div>
                <button style="background:#4caf50;border:none;padding:6px 12px;border-radius:20px;cursor:pointer;">➕ Написать</button>
            </div>
        `;
        
        document.querySelector('.search-result-item')?.addEventListener('click', async () => {
            const chatId = await createOrGetChat(user.uid);
            openChat(chatId, user.uid, user.name, user.avatarBase64);
            document.getElementById('searchInput').value = '';
            container.innerHTML = '';
        });
    }
    
    function renderChatsList() {
        const container = document.getElementById('chatsList');
        if (chats.length === 0) { 
            container.innerHTML = '<div class="no-items">✨ Нет чатов<br>Найдите друга по UID</div>'; 
            return; 
        }
        container.innerHTML = '';
        for (const chat of chats) {
            const isOnline = onlineStatuses.get(chat.peerId) || false;
            const div = document.createElement('div');
            div.className = `chat-item ${currentChatId === chat.chatId ? 'active' : ''}`;
            div.innerHTML = `
                <div class="chat-avatar" style="position:relative;">
                    ${chat.peerAvatar ? `<img src="${chat.peerAvatar}">` : (chat.peerName?.charAt(0).toUpperCase() || '?')}
                    ${isOnline ? '<div class="online-dot"></div>' : ''}
                </div>
                <div class="chat-details">
                    <div class="chat-name">${escapeHtml(chat.peerName || 'Пользователь')}</div>
                    <div class="chat-last-msg">${escapeHtml(chat.lastMessage || 'Новый чат')}</div>
                </div>
            `;
            div.onclick = () => openChat(chat.chatId, chat.peerId, chat.peerName, chat.peerAvatar);
            container.appendChild(div);
        }
    }
    
    function updateProfileUI() {
        if (!currentUserData) return;
        document.getElementById('userName').innerText = currentUserData.name || 'Пользователь';
        document.getElementById('userBio').innerText = currentUserData.bio || 'Нет описания';
        document.getElementById('userEmail').innerText = currentUser.email;
        const avatarDiv = document.getElementById('userAvatar');
        if (currentUserData.avatarBase64) avatarDiv.innerHTML = `<img src="${currentUserData.avatarBase64}">`;
        else avatarDiv.innerHTML = currentUserData.name?.charAt(0).toUpperCase() || 'W';
    }
    
    function showEditProfileModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h2>✏️ Редактировать профиль</h2>
                <input type="text" id="editName" placeholder="Имя" value="${escapeHtml(currentUserData.name || '')}">
                <textarea id="editBio" placeholder="Описание" rows="3">${escapeHtml(currentUserData.bio || '')}</textarea>
                <div class="avatar-upload">
                    <div class="avatar-preview" id="avatarPreview">${currentUserData.avatarBase64 ? `<img src="${currentUserData.avatarBase64}">` : `<span style="font-size:48px;">${currentUserData.name?.charAt(0).toUpperCase() || 'W'}</span>`}</div>
                    <label class="file-input-label">📸 Загрузить фото<input type="file" id="avatarUpload" accept="image/*" style="display:none;"></label>
                </div>
                <div class="my-id-display"><strong>🆔 Ваш UID:</strong><br><span style="font-family:monospace;font-size:11px;word-break:break-all;">${currentUser.uid}</span><button id="copyUidBtn" style="margin-top:8px;padding:6px;font-size:12px;">📋 Копировать</button></div>
                <button id="saveProfileBtn">💾 Сохранить</button>
                <button id="logoutBtn" class="danger">🚪 Выйти</button>
                <button id="closeProfileBtn" class="secondary">Закрыть</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        const fileInput = modal.querySelector('#avatarUpload');
        const preview = modal.querySelector('#avatarPreview');
        modal.querySelector('#copyUidBtn').onclick = () => { navigator.clipboard.writeText(currentUser.uid); alert("✅ UID скопирован!"); };
        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (file) {
                const compressed = await compressAvatar(file, 80);
                await update(ref(rtdb, `users/${currentUser.uid}`), { avatarBase64: compressed });
                currentUserData.avatarBase64 = compressed;
                preview.innerHTML = `<img src="${compressed}">`;
                updateProfileUI();
            }
        };
        modal.querySelector('#saveProfileBtn').onclick = async () => {
            const newName = modal.querySelector('#editName').value.trim();
            const newBio = modal.querySelector('#editBio').value.trim();
            if (newName) currentUserData.name = newName;
            currentUserData.bio = newBio;
            await update(ref(rtdb, `users/${currentUser.uid}`), { name: currentUserData.name, bio: currentUserData.bio });
            updateProfileUI();
            modal.remove();
        };
        modal.querySelector('#logoutBtn').onclick = async () => {
            await updateStatus('offline');
            if (heartbeatInterval) clearInterval(heartbeatInterval);
            await signOut(auth);
            location.reload();
        };
        modal.querySelector('#closeProfileBtn').onclick = () => modal.remove();
    }
    
    // ==================== ИНИЦИАЛИЗАЦИЯ ====================
    async function initApp() {
        document.getElementById('connectionStatus').className = 'connection-status online';
        document.getElementById('connectionStatus').innerHTML = '🟢 Онлайн';
        updateProfileUI();
        startPresence();
        subscribeToChats();
        
        const searchInput = document.getElementById('searchInput');
        searchInput.placeholder = "🔍 Введите UID друга (полностью)";
        searchInput.addEventListener('input', (e) => renderSearchResults(e.target.value));
        document.getElementById('searchBtn').onclick = () => renderSearchResults(searchInput.value);
    }
    
    function bindEvents() {
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('messageInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); else sendTyping(); });
        document.getElementById('userProfileBtn').onclick = showEditProfileModal;
    }
    
    bindEvents();
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            await loadUserData();
            initApp();
        } else {
            showAuthModal();
        }
    });
</script>
