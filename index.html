    const googleProvider = new GoogleAuthProvider();

    // ==================== ПЕРЕМЕННЫЕ ====================
    let currentUser = null;

    let currentChatId = null;

    let unsubscribeChats = null;
    let currentSearchType = 'uid';
    let callsListenerStarted = false;
    
    // WebRTC
    let peerConnection = null;
    let localStream = null;
    let currentCallId = null;
    let ringingInterval = null;
    
    const configuration = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' },

    // ==================== ВСПОМОГАТЕЛЬНЫЕ ====================
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    
    function compressAvatar(file, maxSize = 80) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = maxSize;
                    canvas.height = maxSize;
                    ctx.drawImage(img, 0, 0, maxSize, maxSize);
                    const compressed = canvas.toDataURL('image/jpeg', 0.6);
                    resolve(compressed);
                };
                img.onerror = reject;
                img.src = e.target.result;
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }
    
    function playRingSound() {
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const ctx = new AudioContext();
            const oscillator = ctx.createOscillator();
            const gain = ctx.createGain();
            oscillator.connect(gain);
            gain.connect(ctx.destination);
            oscillator.frequency.value = 440;
            gain.gain.value = 0.3;
            oscillator.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.8);
            oscillator.stop(ctx.currentTime + 0.8);
        } catch(e) {}
    }
    
    // ==================== HEARTBEAT ====================
    function startHeartbeat() {
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        const heartbeatRef = ref(rtdb, `heartbeats/${currentUser.uid}`);
        onDisconnect(heartbeatRef).remove();
        
        const updateOnline = async () => {
            try {
                await set(heartbeatRef, { timestamp: Date.now() });
                await update(ref(rtdb, `users/${currentUser.uid}`), { status: 'online', lastSeen: Date.now() });
            } catch(err) { console.warn("Heartbeat error:", err); }
        };
        
        updateOnline();
        heartbeatInterval = setInterval(updateOnline, 5000);
    }
    
    // ==================== АУТЕНТИФИКАЦИЯ ====================
    function showAuthModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `

                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Войти через Google
                </button>
                <div class="divider"><span>или</span></div>
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <button id="loginTabBtn" style="flex:1; background:#4caf50;">Вход</button>
                    <button id="registerTabBtn" style="flex:1; background:#3a3a3a;">Регистрация</button>
                </div>
                <div id="loginForm">
                    <input type="email" id="loginEmail" placeholder="Email">
                    <input type="password" id="loginPassword" placeholder="Пароль">
                    <button id="forgotPasswordBtn" class="secondary" style="background:#3a3a3a;">🔑 Забыли пароль?</button>

                </div>
                <div id="registerForm" style="display:none;">

                <button id="closeAuthBtn" class="secondary" style="background:#3a3a3a; margin-top:10px;">Закрыть</button>

        document.body.appendChild(modal);
        
        const loginTab = modal.querySelector('#loginTabBtn');
        const registerTab = modal.querySelector('#registerTabBtn');
        const loginForm = modal.querySelector('#loginForm');
        const registerForm = modal.querySelector('#registerForm');
        
        loginTab.onclick = () => { loginTab.style.background = '#4caf50'; registerTab.style.background = '#3a3a3a'; loginForm.style.display = 'block'; registerForm.style.display = 'none'; };
        registerTab.onclick = () => { registerTab.style.background = '#4caf50'; loginTab.style.background = '#3a3a3a'; loginForm.style.display = 'none'; registerForm.style.display = 'block'; };
        
        modal.querySelector('#googleSignInBtn').onclick = async () => {

                const user = result.user;
                const userRef = ref(rtdb, `users/${user.uid}`);
                const snapshot = await new Promise((resolve) => { onValue(userRef, resolve, { onlyOnce: true }); });

    // ==================== ЧАТЫ ====================
    function subscribeToChats() {
        if (unsubscribeChats) unsubscribeChats();
        const q = fsQuery(collection(db, 'chats'), where('participants', 'array-contains', currentUser.uid));
        unsubscribeChats = onSnapshot(q, async (snapshot) => {
            chats = [];
            for (const docSnap of snapshot.docs) {
                const chatData = docSnap.data();
                const peerId = chatData.participants.find(p => p !== currentUser.uid);
                const peerInfo = usersCache.get(peerId) || await loadUserInfo(peerId);
                chats.push({
                    id: docSnap.id,
                    type: 'user',
                    peerId: peerId,
                    name: peerInfo?.name || 'Загрузка...',
                    avatar: peerInfo?.avatarBase64 || null,
                    lastMessage: chatData.lastMessage || '',
                    lastTime: chatData.lastTime || 0
                });
            }
            chats.sort((a,b) => (b.lastTime || 0) - (a.lastTime || 0));
            if (currentTab === 'chats') renderCurrentList();
        });
    }
    
    async function loadUserInfo(uid) {
        try {
            const userRef = ref(rtdb, `users/${uid}`);
            const snapshot = await get(userRef);
            if (snapshot.exists()) {
                const data = snapshot.val();
                usersCache.set(uid, data);
                return data;
            }
        } catch(err) { console.warn(err); }
        return null;
    }
    
    async function createOrGetChat(peerId) {
        try {
            const q = fsQuery(collection(db, 'chats'), where('participants', 'array-contains', currentUser.uid));
            const snapshot = await getDocs(q);
            for (const docSnap of snapshot.docs) {
                const participants = docSnap.data().participants;
                if (participants.includes(peerId)) return docSnap.id;
            }
            const chatId = `chat_${Date.now()}_${Math.random().toString(36).substr(2, 8)}`;
            await setDoc(doc(db, 'chats', chatId), {
                participants: [currentUser.uid, peerId],

                lastTime: 0

            text: text,
            senderId: currentUser.uid,

    function openChat(id, type, name, avatar, peerId = null) {
        if (unsubscribeMessages) unsubscribeMessages();
        currentChatId = id;
        currentChatType = type;
        currentChatPeerName = name;
        
        if (type === 'user') {
            if (peerId) {
                currentChatPeerId = peerId;
            } else {
                const chat = chats.find(c => c.id === id);
                if (chat) currentChatPeerId = chat.peerId;
            }
            console.log("📞 Открыт чат, peerId =", currentChatPeerId);
            updateChatHeaderStatus();
        } else {
            document.getElementById('peerStatus').innerHTML = type === 'group' ? '👥 Группа' : '📢 Канал';
        }
        
        document.getElementById('chatName').innerText = name;
        document.getElementById('chatAvatar').innerHTML = avatar ? `<img src="${avatar}">` : (name?.charAt(0).toUpperCase() || '?');
        document.getElementById('messageInput').disabled = false;
        document.getElementById('sendBtn').disabled = false;
        
        const messagesRef = collection(db, `chats/${id}/messages`);
        const q = fsQuery(messagesRef, orderBy('timestamp', 'asc'));
        unsubscribeMessages = onSnapshot(q, (snapshot) => {
            const msgs = []; 
            snapshot.forEach(doc => msgs.push(doc.data()));
            renderMessages(msgs);
        });
        
        renderCurrentList();
    }
    
    function renderMessages(msgs) {
        const container = document.getElementById('messagesArea');
        if (msgs.length === 0) { 
            container.innerHTML = '<div class="no-items" style="margin-top:60px;">💬 Напишите первое сообщение!</div>'; 
            return; 
        }
        container.innerHTML = '';
        msgs.forEach(msg => {
            const isOutgoing = msg.senderId === currentUser.uid;
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isOutgoing ? 'outgoing' : 'incoming'}`;
            msgDiv.innerHTML = `<div class="message-text">${escapeHtml(msg.text)}</div><div class="message-time">${msg.time}</div>`;
            container.appendChild(msgDiv);
        });
        container.scrollTop = container.scrollHeight;
    }
    
    function renderCurrentList() {
        const container = document.getElementById('chatsList');
        let items = [];
        if (currentTab === 'chats') items = chats;
        else if (currentTab === 'groups') items = groups;
        else items = channels;
        
        if (items.length === 0) {
            container.innerHTML = `<div class="no-items">✨ Нет ${currentTab === 'chats' ? 'чатов' : currentTab === 'groups' ? 'групп' : 'каналов'}</div>`;
            return;
        }
        container.innerHTML = '';
        for (const item of items) {
            const isOnline = currentTab === 'chats' ? (onlineStatuses.get(item.peerId) || false) : false;
            const isActive = (currentChatId === item.id && currentChatType === item.type);
            const div = document.createElement('div');
            div.className = `chat-item ${isActive ? 'active' : ''}`;
            let avatarContent = item.avatar ? `<img src="${item.avatar}">` : (item.name?.charAt(0).toUpperCase() || '?');

            div.innerHTML = `
                <div class="chat-avatar" style="position:relative;">
                    ${avatarContent}
                    ${isOnline ? '<div class="online-dot"></div>' : ''}
                </div>

                    <div class="chat-last-msg">${escapeHtml(lastMsg)}</div>

                if (e.target.classList.contains('chat-menu')) return;
                openChat(item.id, item.type, item.name, item.avatar, item.peerId);
            };

        }

            btn.onclick = (e) => {
                e.stopPropagation();

                const type = btn.dataset.type;
                if (type !== 'user') {
                    alert("Только личные чаты можно удалить");
                    return;
                }
                const menu = document.createElement('div');
                menu.className = 'dropdown-menu';
                menu.innerHTML = `<button class="delete-chat" data-id="${id}">🗑️ Удалить чат</button>`;

                    await deleteChat(id);
                    menu.remove();
                };
                setTimeout(() => {
                    document.addEventListener('click', () => menu.remove(), { once: true });
                }, 100);
            };
        });
    }

    async function searchUsers(query, searchType) {
        if (!query.trim()) return [];
        const results = [];
        const searchLower = query.toLowerCase().trim();
        
        const usersRef = ref(rtdb, 'users');
        const snapshot = await get(usersRef);
        const users = snapshot.val() || {};
        
        for (const [uid, data] of Object.entries(users)) {
            if (uid === currentUser.uid) continue;
            if (searchType === 'uid' && uid.toLowerCase().includes(searchLower)) {
                results.push({ type: 'user', id: uid, name: data.name, avatar: data.avatarBase64 });
            } else if (searchType === 'name' && data.name && data.name.toLowerCase().includes(searchLower)) {
                results.push({ type: 'user', id: uid, name: data.name, avatar: data.avatarBase64 });
            }
        }
        return results;
    }

    // ==================== WEBRTC ЗВОНКИ ====================
    async function startCall(isVideo) {
        if (!currentChatPeerId) {
            alert("Сначала откройте чат с пользователем");
            return;
        }
        
        const isOnline = onlineStatuses.get(currentChatPeerId);
        if (!isOnline) {
            alert("Пользователь не в сети");
            return;
        }
        
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: isVideo });
            createCallWindow(isVideo);
            
            peerConnection = new RTCPeerConnection(configuration);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            
            peerConnection.ontrack = (event) => {
                const remoteVideo = document.getElementById('remoteVideo');
                if (remoteVideo && event.streams[0]) remoteVideo.srcObject = event.streams[0];
            };
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate && currentCallId) {
                    set(ref(rtdb, `calls/${currentCallId}/ice/${Date.now()}`), {
                        candidate: event.candidate.candidate,
                        sdpMid: event.candidate.sdpMid,
                        sdpMLineIndex: event.candidate.sdpMLineIndex
                    });
                }
            };
            
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            
            currentCallId = `call_${Date.now()}_${Math.random().toString(36).substr(2, 6)}`;
            await set(ref(rtdb, `calls/${currentCallId}`), {
                from: currentUser.uid,
                to: currentChatPeerId,
                status: 'waiting',
                offer: { type: offer.type, sdp: offer.sdp },
                type: isVideo ? 'video' : 'audio',
                time: Date.now()
            });
            
            console.log("📞 Звонок отправлен пользователю:", currentChatPeerId);
            console.log("📞 Данные звонка:", { from: currentUser.uid, to: currentChatPeerId, callId: currentCallId });
            
            // Слушаем ответ
            const callRef = ref(rtdb, `calls/${currentCallId}`);
            const listener = onValue(callRef, async (snap) => {
                const data = snap.val();
                console.log("📞 Статус звонка обновлён:", data?.status);
                if (data?.status === 'answered' && data.answer) {
                    off(listener);
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                } else if (data?.status === 'rejected') {
                    off(listener);
                    endCall();
                    alert("Звонок отклонен");
                } else if (data?.status === 'ended') {
                    off(listener);
                    endCall();
                }
            });
            
        } catch(err) {
            console.error(err);
            alert("Ошибка доступа к микрофону/камере");
            endCall();
        }
    }

    function showIncomingCall(callId, call) {
        console.log("📞 ПОКАЗЫВАЕМ УВЕДОМЛЕНИЕ о звонке");
        playRingSound();
        if (ringingInterval) clearInterval(ringingInterval);
        ringingInterval = setInterval(playRingSound, 2000);
        
        const notif = document.createElement('div');
        notif.className = 'call-notification';

        `;

        notif.querySelector('.accept').onclick = async () => {
            notif.remove();

        };
        
        setTimeout(() => {
            if (notif.parentNode) notif.remove();
            clearInterval(ringingInterval);
        }, 30000);
    }
    
    async function acceptCall(callId, call) {
        currentCallId = callId;
        
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: call.type === 'video' });
            createCallWindow(call.type === 'video');
            
            peerConnection = new RTCPeerConnection(configuration);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            
            peerConnection.ontrack = (event) => {
                const remoteVideo = document.getElementById('remoteVideo');
                if (remoteVideo && event.streams[0]) remoteVideo.srcObject = event.streams[0];
            };
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate && currentCallId) {
                    set(ref(rtdb, `calls/${currentCallId}/ice/${Date.now()}`), {
                        candidate: event.candidate.candidate,
                        sdpMid: event.candidate.sdpMid,
                        sdpMLineIndex: event.candidate.sdpMLineIndex
                    });
                }
            };
            
            await peerConnection.setRemoteDescription(new RTCSessionDescription(call.offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            await update(ref(rtdb, `calls/${callId}`), { status: 'answered', answer: { type: answer.type, sdp: answer.sdp } });
            
            // Загружаем ICE кандидаты
            const iceRef = ref(rtdb, `calls/${callId}/ice`);
            onValue(iceRef, (snap) => {
                const ice = snap.val();
                if (ice && peerConnection) {
                    Object.values(ice).forEach(cand => {
                        peerConnection.addIceCandidate(new RTCIceCandidate(cand));
                    });
                }
            });
            
        } catch(err) {
            console.error(err);
            endCall();
        }
    }
    
    function createCallWindow(isVideo) {
        const existing = document.getElementById('callWindow');
        if (existing) existing.remove();
        
        const win = document.createElement('div');
        win.id = 'callWindow';
        win.className = 'call-window';
        win.innerHTML = `
            <div class="video-container">
                ${isVideo ? '<video id="localVideo" autoplay muted playsinline></video>' : '<div style="text-align:center;padding:40px;">🎤 Аудиозвонок...</div>'}
                ${isVideo ? '<video id="remoteVideo" autoplay playsinline></video>' : ''}
            </div>
            <div class="call-controls"><button class="end-call">🔴 Завершить</button></div>
        `;
        document.body.appendChild(win);
        
        if (isVideo && localStream) {
            document.getElementById('localVideo').srcObject = localStream;
        }
        
        win.querySelector('.end-call').onclick = () => endCall();
    }
    
    async function endCall() {
        if (currentCallId) {
            try { await update(ref(rtdb, `calls/${currentCallId}`), { status: 'ended' }); } catch(e) {}
        }
        if (peerConnection) peerConnection.close();
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        document.getElementById('callWindow')?.remove();
        peerConnection = null;
        localStream = null;
        currentCallId = null;
        if (ringingInterval) clearInterval(ringingInterval);
    }
    
    // ==================== ИНИЦИАЛИЗАЦИЯ ====================
    async function initApp() {
        document.getElementById('connectionStatus').className = 'connection-status online';
        document.getElementById('connectionStatus').innerHTML = '🟢 Онлайн';
        updateProfileUI();
        startPresence();
        subscribeToChats();
        
        // Запускаем слушатель звонков ПОСЛЕ того как currentUser установлен
        setTimeout(() => {
            listenForCalls();
        }, 1000);
        
        // Группы и каналы (заглушки)
        groups = [
            { id: 'group1', name: 'Общий чат', type: 'group', members: 42, lastMessage: 'Привет всем!', avatar: null },
            { id: 'group2', name: 'Разработчики', type: 'group', members: 8, lastMessage: 'Новый релиз!', avatar: null }
        ];
        channels = [
            { id: 'channel1', name: 'Новости Ww', type: 'channel', subscribers: 128, lastPost: 'Добро пожаловать!', avatar: null },
            { id: 'channel2', name: 'Анонсы', type: 'channel', subscribers: 56, lastPost: 'Скоро обновление', avatar: null }
        ];
        
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => renderSearchResults(e.target.value));
        document.getElementById('searchBtn').onclick = () => renderSearchResults(searchInput.value);
        document.querySelectorAll('.search-type-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.search-type-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSearchType = btn.dataset.searchType;
                renderSearchResults(searchInput.value);
            };
        });
        
        document.getElementById('audioCallBtn').onclick = () => startCall(false);
        document.getElementById('videoCallBtn').onclick = () => startCall(true);
        document.getElementById('createGroupBtn').onclick = () => alert("Группы в разработке");
        document.getElementById('createChannelBtn').onclick = () => alert("Каналы в разработке");
        
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTab = btn.dataset.tab;
                renderCurrentList();
            };
        });
        
        renderCurrentList();
    }
    
    function bindEvents() {
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('messageInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        document.getElementById('userProfileBtn').onclick = showEditProfileModal;
    }
    
    bindEvents();
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            await loadUserData();
            initApp();
        } else {
            showAuthModal();
        }
    });
</script>
